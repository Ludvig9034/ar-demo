<style>
  :root { --lc-accent: #3370FF; }
  html, body { margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; }
  /* overflow-x: clip prevents horizontal scroll WITHOUT making body a scroll-container,
     which would break position:sticky on child elements */
  html { overflow-x: clip; }
  body { overflow-x: clip; }
  ::selection { background: var(--lc-accent); color: #fff; }
  * { box-sizing: border-box; }
  ::selection { background: #fff; color: #000; }
  /* scroll-behavior removed — Lenis handles smooth scroll */
  body { cursor: default; }

  /* Global reveal system */
  .reveal { opacity: 0; transform: translateY(24px); transition: opacity 900ms cubic-bezier(0.22,1,0.36,1), transform 900ms cubic-bezier(0.22,1,0.36,1); will-change: transform, opacity; }
  .reveal.in { opacity: 1; transform: translateY(0); }
  .reveal-delay-1 { transition-delay: 80ms; }
  .reveal-delay-2 { transition-delay: 160ms; }
  .reveal-delay-3 { transition-delay: 240ms; }
  .reveal-delay-4 { transition-delay: 320ms; }
  .reveal-delay-5 { transition-delay: 400ms; }

  /* Clip-mask reveal — used on headlines */
  .mask-line { display: inline-block; overflow: hidden; vertical-align: bottom; }
  .mask-line > span { display: inline-block; transform: translateY(110%); transition: transform 1100ms cubic-bezier(0.22,1,0.36,1); }
  .mask-line.in > span { transform: translateY(0); }
  /* Force each heading line onto its own row — prevents inline-block lines merging */
  h1 > .mask-line, h2 > .mask-line, h3 > .mask-line { display: block; }

  /* Scroll ticker base */
  @keyframes marquee {
    from { transform: translate3d(0,0,0); }
    to   { transform: translate3d(-50%, 0, 0); }
  }

  /* Grain */
  .grain::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 100;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22240%22 height=%22240%22><filter id=%22n%22><feTurbulence type=%22fractalNoise%22 baseFrequency=%220.9%22/></filter><rect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23n)%22/></svg>");
    opacity: 0.045; mix-blend-mode: overlay;
  }

  /* Cursor ring */
  .cursor-ring {
    position: fixed; top: 0; left: 0; width: 28px; height: 28px;
    border: 1px solid rgba(255,255,255,0.9); border-radius: 50%;
    transform: translate(-50%,-50%); pointer-events: none; z-index: 9999;
    mix-blend-mode: difference;
    transition: width 320ms cubic-bezier(0.22,1,0.36,1), height 320ms cubic-bezier(0.22,1,0.36,1), background 320ms;
  }
  .cursor-ring.hover { width: 72px; height: 72px; background: rgba(255,255,255,0.08); }
  .cursor-dot {
    position: fixed; top: 0; left: 0; width: 4px; height: 4px;
    background: #fff; border-radius: 50%; transform: translate(-50%,-50%);
    pointer-events: none; z-index: 9999; mix-blend-mode: difference;
  }
  @media (pointer: coarse) {
    .cursor-ring, .cursor-dot { display: none; }
  }

  /* Progress bar */
  .progress {
    position: fixed; top: 0; left: 0; height: 1px; background: var(--lc-accent);
    z-index: 9998; width: 0%; transition: width 80ms linear;
    box-shadow: 0 0 8px var(--lc-accent);
  }

  /* Hide native scrollbars on marquees */
  .no-scrollbar::-webkit-scrollbar { display: none; }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed; bottom: 24px; right: 24px; z-index: 200;
    background: rgba(10,10,10,0.92); border: 1px solid rgba(255,255,255,0.15);
    padding: 18px 20px; font-family: 'Space Mono', monospace; font-size: 11px;
    color: #fff; letter-spacing: 0.06em; min-width: 260px;
    backdrop-filter: blur(6px);
  }
  .tweaks-panel label { display: block; margin-top: 12px; color: rgba(255,255,255,0.55); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
  .tweaks-panel .row { display: flex; gap: 6px; margin-top: 6px; }
  .tweaks-panel button {
    background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #fff;
    padding: 5px 10px; font-family: inherit; font-size: 10px; letter-spacing: 0.08em;
    text-transform: uppercase; cursor: pointer; flex: 1;
  }
  .tweaks-panel button.active { background: #fff; color: #000; border-color: #fff; }
  .tweaks-panel button:hover { border-color: #fff; }

  /* Selection cursor overrides when over hot areas */
  .hotzone { cursor: none; }
</style>

<script type="text/babel">
const { useEffect } = React;

/* ── Sticky mobil CTA-bar ── */
const MobileCTA = () => {
  const scrollY = useScrollY();
  const w = useWindowWidth();
  const totalH = document.documentElement.scrollHeight;
  if (w >= 640) return null;
  if (scrollY < 700) return null;
  if (scrollY > totalH - 1400) return null;
  return (
    <div style={{
      position: 'fixed', bottom: 0, left: 0, right: 0, zIndex: 500,
      background: 'rgba(0,0,0,0.92)', backdropFilter: 'blur(14px)',
      WebkitBackdropFilter: 'blur(14px)',
      borderTop: '1px solid rgba(255,255,255,0.1)',
      padding: '10px 16px 24px',
      display: 'flex', gap: 10,
    }}>
      <a href="mailto:kontakt@loudcolors.dk" style={{
        flex: 1, background: '#fff', color: '#000',
        padding: '14px 12px', textAlign: 'center',
        fontFamily: 'Inter, sans-serif', fontSize: 12,
        fontWeight: 700, letterSpacing: '0.16em',
        textTransform: 'uppercase', textDecoration: 'none',
        display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
      }}>BOOK ET MØDE <span>→</span></a>
      <a href="tel:+4561779915" style={{
        background: 'transparent', color: '#fff',
        border: '1px solid rgba(255,255,255,0.25)',
        padding: '14px 16px',
        fontFamily: 'Space Mono, monospace', fontSize: 11,
        letterSpacing: '0.08em',
        textDecoration: 'none', whiteSpace: 'nowrap',
        display: 'flex', alignItems: 'center',
      }}>Ring ↗</a>
    </div>
  );
};

const App = () => {
  // Global mount-level animation systems
  useEffect(() => {
    // Custom cursor
    const ring = document.getElementById('__cursor');
    const dot  = document.getElementById('__dot');
    let rx = 0, ry = 0, dx = 0, dy = 0, tx = 0, ty = 0;
    const onMove = (e) => { tx = e.clientX; ty = e.clientY; dx = tx; dy = ty; };
    const onOver = (e) => {
      const el = e.target.closest('a,button,.hot,[data-hot]');
      if (el) ring.classList.add('hover'); else ring.classList.remove('hover');
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseover', onOver);
    const raf = () => {
      rx += (tx - rx) * 0.15; ry += (ty - ry) * 0.15;
      ring.style.transform = `translate(${rx}px, ${ry}px) translate(-50%,-50%)`;
      dot.style.transform = `translate(${dx}px, ${dy}px) translate(-50%,-50%)`;
      requestAnimationFrame(raf);
    };
    raf();

    // Scroll progress
    const prog = document.getElementById('__progress');
    const onScroll = () => {
      const h = document.documentElement;
      const scrolled = h.scrollTop / (h.scrollHeight - h.clientHeight);
      prog.style.width = `${Math.min(1, Math.max(0, scrolled)) * 100}%`;
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();

    // IntersectionObserver for reveals + mask-lines
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('in');
          if (!e.target.dataset.keep) io.unobserve(e.target);
        }
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -5% 0px' });
    const scan = () => {
      document.querySelectorAll('.reveal:not(.in), .mask-line:not(.in)').forEach(el => io.observe(el));
    };
    scan();
    const mo = new MutationObserver(scan);
    mo.observe(document.body, { childList: true, subtree: true });

    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseover', onOver);
      window.removeEventListener('scroll', onScroll);
      io.disconnect();
      mo.disconnect();
    };
  }, []);

  return (
    <>
      <Hero/>
      <WhatIsAR/>
      <CasesStrip/>
      <Statement/>
      <Capabilities/>
      <CaseStudyKiMs/>
      <Stats/>
      <CaseStudyHarboe/>
      <FAQ/>
      <CTAFooter/>
      <Tweaks/>
      <MobileCTA/>
    </>
  );
};

const waitFor = () => {
  const needed = ['Hero','WhatIsAR','CasesStrip','Statement','Capabilities','CaseStudyKiMs','CaseStudyHarboe','Stats','FAQ','CTAFooter','Tweaks'];
  if (needed.every(n => window[n])) {
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  } else setTimeout(waitFor, 40);
};
waitFor();
</script>
<script>
/* ── Lenis smooth scroll — desktop + optional touch ── */
const lenis = new Lenis({
  duration: 1.2,
  easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
  wheelMultiplier: 1.0,
  autoRaf: true,
});
</script>
